<!DOCTYPE html>
<html>
<head>
    <title>미사일 게임</title>
    <style>
        /* CSS 스타일링 */
        canvas {
            border: 1px solid black;
        }
    </style>
</head>
<body>
    <canvas id="canvas" width="800" height="600"></canvas>
    <p id="score">점수: 0</p>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');

        class Missile {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.width = 10;
                this.height = 20;
                this.speed = 5;
            }

            draw() {
                ctx.fillStyle = 'red';
                ctx.fillRect(this.x, this.y, this.width, this.height);
            }

            update() {
                this.y -= this.speed;
            }
        }

        class Enemy {
            constructor(x, y, direction) {
                this.x = x;
                this.y = y;
                this.width = 50;
                this.height = 50;
                this.direction = direction;
            }

            draw() {
                ctx.fillStyle = 'blue';
                ctx.fillRect(this.x, this.y, this.width, this.height);
            }

            update() {
                if (this.direction === 'down') {
                    this.y += 2;
                } else if (this.direction === 'up') {
                    this.y -= 2;
                } else if (this.direction === 'right') {
                    this.x += 2;
                } else if (this.direction === 'left') {
                    this.x -= 2;
                }
            }
        }

        class Player {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.width = 50;
                this.height = 50;
            }

            draw() {
                ctx.fillStyle = 'green';
                ctx.fillRect(this.x, this.y, this.width, this.height);
            }
        }

        let player = new Player(375, 550);
        let enemies = [];
        let missiles = [];
        let score = 0;

        document.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            player.x = e.clientX - rect.left - player.width / 2;
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === ' ') {
                missiles.push(new Missile(player.x + 20, player.y));
            }
        });

        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            player.draw();

            missiles.forEach((missile, index) => {
                missile.update();
                missile.draw();
                if (missile.y < 0) {
                    missiles.splice(index, 1);
                }
            });

            enemies.forEach((enemy, index) => {
                enemy.update();
                enemy.draw();
                if (enemy.y > canvas.height || enemy.y < 0 || enemy.x > canvas.width || enemy.x < 0) {
                    enemies.splice(index, 1);
                }
            });

            missiles.forEach((missile, index) => {
                enemies.forEach((enemy, enemyIndex) => {
                    if (checkCollision(missile, enemy)) {
                        missiles.splice(index, 1);
                        enemies.splice(enemyIndex, 1);
                        score++;
                        scoreElement.innerText = `점수: ${score}`;
                        if (score % 10 === 0) {
                            alert(`레벨 ${score / 10} 달성!`);
                        }
                    }
                });
            });

            enemies.forEach((enemy) => {
                if (checkCollision(player, enemy)) {
                    alert('게임 오버!');
                    // 게임 오버 처리
                }
            });

            requestAnimationFrame(gameLoop);
        }

        function checkCollision(obj1, obj2) {
            if (obj1.x + obj1.width > obj2.x &&
                obj1.x < obj2.x + obj2.width &&
                obj1.y + obj1.height > obj2.y &&
                obj1.y < obj2.y + obj2.height) {
                return true;
            }
            return false;
        }

        setInterval(() => {
            const x = Math.random() * (canvas.width - 50);
            const type = Math.random();
            if (type < 0.25) {
                enemies.push(new Enemy(x, 0, 'down'));
            } else if (type < 0.5) {
                enemies.push(new Enemy(x, canvas.height, 'up'));
            } else if (type < 0.75) {
                enemies.push(new Enemy(0, Math.random() * (canvas.height - 50), 'right'));
            } else {
                enemies.push(new Enemy(canvas.width - 50, Math.random() * (canvas.height - 50), 'left'));
            }
        }, 1000);

        gameLoop();
    </script>
</body>
</html>
