<!DOCTYPE html>
<html>
<head>
    <title>쇼핑몰</title>
    <style>
        table {
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 10px;
        }
    </style>
</head>
<body>
    <h1>쇼핑몰</h1>
    <h2>상품 관리</h2>
    <table id="product-table">
        <thead>
            <tr>
                <th>상품명</th>
                <th>가격</th>
                <th>설명</th>
                <th>수정/삭제</th>
            </tr>
        </thead>
        <tbody id="product-body">
        </tbody>
    </table>
    <form id="product-form">
        <input type="text" id="product-name" placeholder="상품명">
        <input type="number" id="product-price" placeholder="가격">
        <textarea id="product-description" placeholder="설명"></textarea>
        <button id="product-add-btn">상품 추가</button>
    </form>

    <h2>장바구니</h2>
    <table id="cart-table">
        <thead>
            <tr>
                <th>상품명</th>
                <th>수량</th>
                <th>가격</th>
                <th>삭제</th>
            </tr>
        </thead>
        <tbody id="cart-body">
        </tbody>
    </table>

    <h2>구매 내역</h2>
    <table id="purchase-table">
        <thead>
            <tr>
                <th>상품명</th>
                <th>수량</th>
                <th>가격</th>
            </tr>
        </thead>
        <tbody id="purchase-body">
        </tbody>
    </table>

    <script>
        let products = [];
        let cart = [];
        let purchases = [];

        const productBody = document.getElementById('product-body');
        const cartBody = document.getElementById('cart-body');
        const purchaseBody = document.getElementById('purchase-body');
        const productForm = document.getElementById('product-form');
        const productAddBtn = document.getElementById('product-add-btn');

        // 상품 추가
        productAddBtn.addEventListener('click', (e) => {
            e.preventDefault();
            const name = document.getElementById('product-name').value;
            const price = parseInt(document.getElementById('product-price').value);
            const description = document.getElementById('product-description').value;
            products.push({ name, price, description });
            renderProducts();
            productForm.reset();
        });

        // 상품 렌더링
        function renderProducts() {
            productBody.innerHTML = '';
            products.forEach((product, index) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${product.name}</td>
                    <td>${product.price}</td>
                    <td>${product.description}</td>
                    <td>
                        <button onclick="updateProduct(${index})">수정</button>
                        <button onclick="deleteProduct(${index})">삭제</button>
                        <button onclick="addToCart(${index})">장바구니에 추가</button>
                    </td>
                `;
                productBody.appendChild(row);
            });
        }

        // 상품 수정
        function updateProduct(index) {
            const product = products[index];
            const name = prompt('상품명을 입력하세요', product.name);
            const price = parseInt(prompt('가격을 입력하세요', product.price));
            const description = prompt('설명을 입력하세요', product.description);
            products[index] = { name, price, description };
            renderProducts();
        }

        // 상품 삭제
        function deleteProduct(index) {
            if (confirm('정말 삭제하시겠습니까?')) {
                products.splice(index, 1);
                renderProducts();
            }
        }

        // 장바구니에 추가
        function addToCart(index) {
            const product = products[index];
            const existingItem = cart.find((item) => item.product === product);
            if (existingItem) {
                existingItem.quantity++;
            } else {
                cart.push({ product, quantity: 1 });
            }
            renderCart();
        }

        // 장바구니 렌더링
        function renderCart() {
            cartBody.innerHTML = '';
            cart.forEach((item, index) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${item.product.name}</td>
                    <td>${item.quantity}</td>
                    <td>${item.product.price * item.quantity}</td>
                    <td><button onclick="deleteFromCart(${index})">삭제</button></td>
                `;
                cartBody.appendChild(row);
            });
        }

        // 장바구니에서 삭제
        function deleteFromCart(index) {
            if (confirm('정말 삭제하시겠습니까?')) {
                cart.splice(index, 1);
                renderCart();
            }
        }

        // 구매
        function purchase() {
            purchases = purchases.concat(cart);
            cart = [];
            renderCart();
            renderPurchases();
        }

        // 구매 내역 렌더링
        function renderPurchases() {
            purchaseBody.innerHTML = '';
            purchases.forEach((item) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${item.product.name}</td>
                    <td>${item.quantity}</td>
                    <td>${item.product.price * item.quantity}</td>
                `;
                purchaseBody.appendChild(row);
            });
        }

        renderProducts();
    </script>
    <button onclick="purchase()">구매</button>
</body>
</html>
